{% extends "admin/base.html" %}
{% load i18n %}

{% block title %}{{ title }} | {% trans 'Administração do Django' %}{% endblock %}

{% block branding %}
<h1 id="site-name"><a href="{% url 'admin:index' %}">{% trans 'Administração do Django' %}</a></h1>
{% endblock %}

{% block nav-global %}{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
  :root {
    --header-bg: #0c2340;
    --header-title: #d4a84b;
    --header-links: #e2e8f0;
    --main-bg: #0f172a;
    --main-bg-alt: #1e293b;
    --main-text: #cbd5e1;
    --main-heading: #e2e8f0;
    --section-header-bg: #1e3a5f;
    --section-header-text: #cbd5e1;
    --link: #94a3b8;
    --link-hover: #e2e8f0;
    --add-green: #22c55e;
    --change-yellow: #d4a84b;
    --sidebar-bg: #0f172a;
    --sidebar-heading: #cbd5e1;
    --sidebar-sub: #94a3b8;
    --border: #334155;
    --input-bg: #1e293b;
  }
  body {
    background: var(--main-bg) !important;
    color: var(--main-text) !important;
  }
  #header {
    background: var(--header-bg) !important;
    color: var(--header-links) !important;
    border-bottom: none;
    padding: 12px 24px;
  }
  #header form,
  #header [class*="theme"],
  #header [id*="theme"] {
    display: none !important;
  }
  #header * {
    background: transparent !important;
    border-color: transparent !important;
    color: var(--header-links) !important;
  }
  #header a { color: var(--header-links) !important; }
  #branding h1 {
    margin: 0;
    font-size: 1.5rem;
    font-weight: 700;
  }
  #branding h1 a,
  #branding h1 a:link,
  #branding h1 a:visited {
    color: var(--header-title) !important;
    font-weight: 700;
  }
  #branding h1 a:hover { color: #eab308 !important; }
  #user-tools a,
  #user-tools a:link,
  #user-tools a:visited {
    color: var(--header-links) !important;
  }
  #user-tools a:hover { color: #fff !important; }
  #content {
    background: var(--main-bg) !important;
    color: var(--main-text) !important;
    padding: 24px;
  }
  #content h1 {
    color: var(--main-heading) !important;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
    margin-bottom: 24px;
    font-size: 1.5rem;
    font-weight: 600;
  }
  #content-main {
    background: var(--main-bg) !important;
  }
  .module h2,
  .module caption {
    background: var(--section-header-bg) !important;
    color: var(--section-header-text) !important;
    border: none;
    padding: 12px 16px;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .module table {
    background: var(--main-bg-alt) !important;
    border: 1px solid var(--border);
    border-top: none;
  }
  .module th {
    background: var(--section-header-bg) !important;
    color: var(--main-text) !important;
    border-color: var(--border);
    padding: 10px 14px;
  }
  .module td {
    background: var(--main-bg-alt) !important;
    color: var(--main-text) !important;
    border-color: var(--border);
    padding: 10px 14px;
  }
  .module tr:nth-child(even) td { background: #1e293b !important; }
  a:link, a:visited {
    color: var(--link) !important;
  }
  a:hover { color: var(--link-hover) !important; }
  .addlink a, a.addlink, .add-row a {
    color: var(--add-green) !important;
  }
  .changelink a, a.changelink {
    color: var(--change-yellow) !important;
  }
  .dashboard #content-main .module {
    background: transparent !important;
    border: none;
    margin-bottom: 24px;
  }
  .dashboard #content-main .module table {
    border: 1px solid var(--border);
    background: var(--main-bg-alt) !important;
  }
  .dashboard .module h2,
  .dashboard .module caption {
    background: var(--section-header-bg) !important;
    color: var(--section-header-text) !important;
  }
  #recent-actions-module {
    background: var(--sidebar-bg) !important;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  #recent-actions-module h2 {
    background: var(--sidebar-bg) !important;
    color: var(--sidebar-heading) !important;
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    margin: 0;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 6px 6px 0 0;
  }
  #recent-actions-module h3 {
    color: var(--sidebar-sub) !important;
    padding: 10px 16px;
    margin: 0;
    font-size: 0.9rem;
  }
  #recent-actions-module .actionlist { padding: 12px 16px; color: var(--sidebar-sub); }
  .xfull { border-color: var(--border); }
  input[type="text"],
  input[type="password"],
  input[type="email"],
  input[type="url"],
  input[type="number"],
  textarea,
  select {
    background: var(--input-bg) !important;
    color: var(--main-text) !important;
    border: 1px solid var(--border);
    padding: 8px 12px;
    border-radius: 4px;
  }
  .button, input[type="submit"], input[type="button"],
  .submit-row input {
    background: var(--section-header-bg) !important;
    color: var(--main-text) !important;
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 4px;
    font-weight: 500;
  }
  .button:hover, input[type="submit"]:hover {
    background: #2563eb !important;
    color: #fff;
    border-color: #2563eb;
  }
  .errornote {
    background: #450a0a;
    color: #fecaca;
    border: 1px solid #b91c1c;
    border-radius: 4px;
  }
  .success { color: #22c55e; }
  .breadcrumbs {
    background: var(--main-bg) !important;
    color: var(--sidebar-sub);
    border: none;
    padding: 10px 0;
    margin-bottom: 16px;
    font-size: 0.9rem;
  }
  .breadcrumbs a { color: var(--link) !important; }
  #changelist-filter {
    background: var(--sidebar-bg) !important;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  #changelist-filter h2 {
    background: var(--section-header-bg) !important;
    color: var(--sidebar-heading) !important;
    padding: 12px 16px;
    margin: 0;
    border-bottom: 1px solid var(--border);
    border-radius: 6px 6px 0 0;
  }
  #changelist-filter h3 { color: var(--sidebar-sub); }
  #changelist-filter li a { color: var(--link) !important; }
  .paginator {
    background: var(--main-bg-alt);
    color: var(--main-text);
    border: 1px solid var(--border);
    padding: 12px;
    border-radius: 4px;
  }
  .paginator a { color: var(--link) !important; }
  .form-row label {
    color: var(--main-text) !important;
  }
  fieldset.module {
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  fieldset.module h2 {
    background: var(--section-header-bg) !important;
    color: var(--section-header-text) !important;
    border-radius: 6px 6px 0 0;
  }
</style>
{% endblock %}
